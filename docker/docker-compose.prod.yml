version: '3.9'

services:
  # PostgreSQL database for transaction caching/analytics (optional)
  postgres:
    image: postgres:15-alpine
    container_name: autoblockchain-db
    environment:
      POSTGRES_USER: blockchain_user
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: vehicle_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockchain_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockchain-network

  # Backend API Service
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: autoblockchain-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      FABRIC_CHANNEL: vehicle-channel
      FABRIC_CHAINCODE: vehicle-lifecycle
      FABRIC_MSP_ID: Org1MSP
      FABRIC_PEER: peer0.org1.example.com:7051
      FABRIC_PEER_ALIAS: peer0.org1.example.com
      FABRIC_USER: appUser
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: blockchain_user
      DB_PASSWORD: secure_password_change_me
      DB_NAME: vehicle_ledger
      LOG_LEVEL: info
    volumes:
      - ../backend:/app/backend
      - ../blockchain-network/crypto-config:/app/blockchain-network/crypto-config:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blockchain-network
    restart: unless-stopped

  # Hyperledger Fabric CA (Certificate Authority)
  ca:
    image: hyperledger/fabric-ca:latest
    container_name: autoblockchain-ca
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca.org1.example.com
      FABRIC_CA_SERVER_TLS_ENABLED: 'false'
    ports:
      - "7054:7054"
    volumes:
      - ./crypto-config/peerOrganizations/org1.example.com/ca:/etc/hyperledger/fabric-ca-server-config
    command: sh -c 'fabric-ca-server start -b admin:adminpw'
    networks:
      - blockchain-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7054/api/v1/cainfo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Hyperledger Fabric Orderer
  orderer:
    image: hyperledger/fabric-orderer:latest
    container_name: autoblockchain-orderer
    environment:
      ORDERER_GENERAL_LOGLEVEL: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_GENESISMETHOD: file
      ORDERER_GENERAL_GENESISFILE: /var/hyperledger/orderer/orderer.genesis.block
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
    ports:
      - "7050:7050"
    volumes:
      - ./channel-artifacts:/var/hyperledger/orderer
      - ./crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
    command: orderer
    networks:
      - blockchain-network
    depends_on:
      - ca

  # Hyperledger Fabric Peer
  peer0:
    image: hyperledger/fabric-peer:latest
    container_name: autoblockchain-peer0
    environment:
      CORE_PEER_ID: peer0.org1.example.com
      CORE_PEER_ADDRESS: peer0.org1.example.com:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.org1.example.com:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.org1.example.com:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.org1.example.com:7051
      CORE_PEER_LOCALMSPID: Org1MSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
      CORE_CHAINCODE_LOGGING_LEVEL: INFO
    ports:
      - "7051:7051"
    volumes:
      - ./crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls:/etc/hyperledger/fabric/tls
    command: peer node start
    networks:
      - blockchain-network
    depends_on:
      - orderer
    healthcheck:
      test: ["CMD", "peer", "version"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CLI for chaincode operations
  cli:
    image: hyperledger/fabric-tools:latest
    container_name: autoblockchain-cli
    tty: true
    environment:
      CORE_PEER_LOCALMSPID: Org1MSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/msp/users/Admin@org1.example.com/msp
      CORE_PEER_ADDRESS: peer0.org1.example.com:7051
    volumes:
      - ./crypto-config:/etc/hyperledger/msp
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ../chaincode:/opt/gopath/src/github.com/chaincode
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    networks:
      - blockchain-network
    depends_on:
      - peer0

volumes:
  postgres_data:

networks:
  blockchain-network:
    driver: bridge
