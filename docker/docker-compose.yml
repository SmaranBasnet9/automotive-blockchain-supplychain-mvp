version: '3.9'
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
    volumes:
      - ../backend:/app/backend

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - '5173:5173'
    volumes:
      - ../frontend:/app/frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
